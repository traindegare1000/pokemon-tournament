<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="accueil.css">
    <title>Pokémon Combat</title>
  </head>
  <body>

    <div id="page-accueil">

      <div id="titre-principal">
        <h1>⚡ Pokémon Combat ⚡</h1>
        <p>Choisis ton mode de jeu</p>
      </div>

      <div id="cartes-modes">

        <div class="carte-mode" onclick="window.location.href='solo.html'">
          <div class="carte-mode-icon">⚔️</div>
          <div class="carte-mode-titre">Solo</div>
          <div class="carte-mode-desc">2 joueurs sur le même écran. Chacun choisit son équipe et c'est parti !</div>
          <button class="btn-mode btn-solo">Jouer</button>
        </div>

        <div class="carte-mode" onclick="window.location.href='multijoueur.html'">
          <div class="carte-mode-icon">🌐</div>
          <div class="carte-mode-titre">Multijoueur</div>
          <div class="carte-mode-desc">Affronte un ami en ligne depuis n'importe où !</div>
          <button class="btn-mode btn-multi">Jouer</button>
        </div>

        <div class="carte-mode" onclick="window.location.href='tournoi.html'">
          <div class="carte-mode-icon">🏆</div>
          <div class="carte-mode-titre">Tournoi</div>
          <div class="carte-mode-desc">Organise un tournoi avec tes amis et un bracket automatique !</div>
          <button class="btn-mode btn-tournoi">Jouer</button>
        </div>

      </div>

    </div>

    <script src="accueil.js"></script>
  </body>
</html>
