<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="tournoi.css">
    <link rel="stylesheet" href="accueil.css">
    <title>Tournoi - Pokémon Combat</title>
  </head>
  <body>

    <!-- FOND ANIMÉ GIRATINA -->
    <canvas id="canvas-fond"></canvas>
    <img id="sprite-legendaire" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/487.png" alt="">

    <div id="section-creation">
      <h2>Créer un tournoi</h2>
      <div id="form-tournoi">
        <input type="text" id="input-nom-tournoi" placeholder="Nom du tournoi...">
        <input type="text" id="input-nom-joueur" placeholder="Ton nom de joueur...">
        <button onclick="creerTournoi()">🏆 Créer le tournoi</button>
      </div>
    </div>

    <div id="section-rejoindre">
      <h2>Rejoindre un tournoi</h2>
      <div id="form-rejoindre">
        <input type="text" id="input-code-tournoi" placeholder="Code du tournoi..." maxlength="6" style="text-transform:uppercase">
        <input type="text" id="input-nom-joueur2" placeholder="Ton nom de joueur...">
        <button onclick="rejoindreTournoi()">⚔️ Rejoindre</button>
      </div>
    </div>

    <button id="btn-retour" onclick="window.location.href='accueil.html'" style="position:fixed;bottom:20px;left:20px;background:transparent;color:rgba(255,255,255,0.7);border:2px solid rgba(255,255,255,0.3);padding:10px 20px;border-radius:20px;cursor:pointer;font-size:14px;">🔙 Retour</button>

    <div id="section-tournoi" class="cache">
      <div id="info-tournoi">
        <h2 id="titre-tournoi"></h2>
        <p id="code-tournoi-affiche" style="font-size:30px;font-weight:bold;color:#ffcb05;letter-spacing:5px;"></p>
        <p id="statut-tournoi" style="color:gray;"></p>
        <p id="statut-equipes" style="color:#4CAF50;font-size:14px;"></p>
      </div>

      <div id="liste-joueurs"></div>

      <div id="zone-boutons" style="display:flex;gap:15px;justify-content:center;flex-wrap:wrap;margin:20px 0;">
        <button id="btn-equipe" class="cache" onclick="allerChoisirEquipe()">🎮 Choisir mon équipe</button>
        <button id="btn-demarrer" class="cache" onclick="demarrerTournoi()">🚀 Démarrer le tournoi !</button>
      </div>

      <div id="bracket"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="tournoi.js"></script>
    <script src="fond-anime.js"></script>
  </body>
</html>
